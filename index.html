<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energetique</title>
    <link rel="stylesheet" href="style1.css">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">

</head>

<body>
    <h1>Calcul Valeur énergétique d'un repas</h1>
    <h2>Choisir les aliments qui composent votre repas :</h2>
    <div class="container-choisir">
        <label for="Cho">Choisissez-en un</label>
        <label for="diabete">diabète</label><input type="radio" name="Cho" id="diabete" onchange="Change(this)"
            value="diabete">
        <label for="rigime">rigime</label><input type="radio" name="Cho" id="rigime" onchange="Change(this)"
            value="rigime">
    </div>
    <form action="#">
        <div class="Container">
            <div class="container-pain">
                <input type="checkbox" name="check" id="checkP" value="Pain">
                <label for="nbr">Pain :</label>
                <input type="text" name="nbr" id="qtyPain" class="zone">
                <p class="GraM">grammes</p>
            </div>
            <div class="container-viande">
                <input type="checkbox" name="check" id="checkV" value="Viande">
                <label for="nbr">Viande :</label>
                <input type="text" name="nbr" id="qtyViande" class="zone">
                <p class="GraM">grammes</p>
            </div>
            <div class="container-legumes">
                <input type="checkbox" name="check" id="checkL" value="Légumes">
                <label for="nbr">Légumes :</label>
                <input type="text" name="nbr" id="qtyLegumes" class="zone">
                <p class="GraM">grammes</p>
            </div>
            <div class="container-banane">
                <input type="checkbox" name="check" id="checkB" value="Banane">
                <label for="nbr">Banane :</label>
                <input type="text" name="nbr" id="qtyBanane" class="zone">
                <p class="Unit">Unités</p>
            </div>
            <div class="container-pomme">
                <input type="checkbox" name="check" id="checkPm" value="Pomme">
                <label for="nbr">Pomme :</label>
                <input type="text" name="nbr" id="qtyPomme" class="zone">
                <p class="Unit">Unités</p>
            </div>
            <div class="container-yaourt">
                <input type="checkbox" name="check" id="checkY" value="Yaourt">
                <label for="nbr">Yaourt :</label>
                <input type="text" name="nbr" id="qtyYaourt" class="zone">
                <p class="Unit">Unités</p>
            </div>
            <div class="container-btn">
                <button type="button" onclick="calculer()">Calculer</button>
            </div>
            <div class="container-resultat">

                <input type="text" id="resultat" name="nbrr" readonly placeholder="La valeur énergétique">

            </div>
            <div class="container-diabet" style="display: none;" id="conTdiaBt">
                
                <input type="text" name="nbrr" id="resultDia" readonly placeholder="Charge Glycémique">


            </div>
        </div>
    </form>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Calculateur de Valeur Énergétique - Tous droits réservés</p>
            <div class="footer-links">
                <a href="#">À propos</a>
                <a href="#">Contact</a>
                <a href="#">Politique de confidentialité</a>
            </div>
        </div>
    </footer>

</body>
<script src="Calories.JS"></script>

</html>
